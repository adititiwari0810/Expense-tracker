# Render Blueprint — Single-service deployment
# Express serves both the API and the built React frontend.
#
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: expense-tracker
    runtime: node
    plan: free
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install"
    startCommand: "cd backend && node src/index.js"
    envVars:
      - key: NODE_ENV
        value: production
