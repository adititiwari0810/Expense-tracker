# Render Blueprint — Single-service deployment
# Express serves both the API and the built React frontend.
#
# Root Directory is set to "backend" so Render detects the Node runtime
# from backend/package.json. The full repo is still cloned, so
# cd ../frontend works to build the React app.
#
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: expense-tracker
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: "npm install && cd ../frontend && npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
